<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>

        <!--Inline CSS-->
        <style>
            body{
                font-family:Arial;
                background:linear-gradient(to right,#00f2fe)
                display: flex;
                justify-content:center;
                align-items:center;
                height: 100vh;
             }

            .login-box{
                background:white;
                padding:30px;
                border-radius:10px;
                width:300px;
                text-align:center;
                box-shadow:0 0 10px rgba(0,0,0,0,2);
             }

             h2{
                margin-bottom: 20px;
             }

             input{
                width: 90%;
                padding: 10px;
                margin:10px 0;
                border:1px solid #ccc;
                border-radius:5px;
                }
        
            button{
                width:95%;
                padding:10px;
                background: #4facfe;
                border:none;
                color:white;
                font-size:16px;
                border-radius: 5px;
                cursor:pointer
            }

            button:hover{
                background:#00c6ff;
            }
    
            .error{
                color:red;
                font-size: 14px;
            }       
            </style>
            </head>
        
            <body>

                <div class="login-box">
                    <h2>Login</h2>

                    <input type="text" id="username" placeholder="Enter Username">
                    <input type="password"id="password" placeholder="enter password">

                    <button onclick="login()">login</button>

                    <p class="error"id="errorMsg"></p>
                    </div>

                  </body>
                  </html>
